stages:
  - test

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"

cache:
  key: maven-cache
  paths:
    - .m2/repository/

test-backend:
  stage: test
  image: maven:3.9-eclipse-temurin-21
  script:
    # Disable the frontend profile so npm is NOT called
    - mvn -B --no-transfer-progress -P'!frontend' -DskipTests=false test
