stages: [test, docker]

test-backend:
  stage: test
  image: trion/maven-node:latest
  cache:
    key: maven-cache
    paths: [ .m2/repository/ ]
  variables:
    MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  script:
    - cd courseflow/courseflow
    - mvn -B -P '!frontend' -DskipTests=false test

docker-build:
  stage: docker
  image: docker:24
  services: [ "docker:24-dind" ]
  variables:
    DOCKER_TLS_CERTDIR: ""
    IMAGE_SHA: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - cd courseflow/courseflow
    - docker build -t "$IMAGE_SHA" .
    - docker push "$IMAGE_SHA"
  needs: ["test-backend"]
  rules:
    - if: $CI_COMMIT_BRANCH
