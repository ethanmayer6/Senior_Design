spring.application.name=courseflow
spring.datasource.url=${COURSEFLOW_DB_URL:jdbc:postgresql://localhost:5432/courseflow}
spring.datasource.username=${COURSEFLOW_DB_USERNAME:courseflow}
spring.datasource.password=${COURSEFLOW_DB_PASSWORD:courseflow}
spring.jpa.hibernate.ddl-auto=${COURSEFLOW_JPA_DDL_AUTO:update}
spring.datasource.driver-class-name=org.postgresql.Driver
# --- JPA / HIBERNATE CONFIG ---
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.cache.type=simple
courseflow.jwt.secret=${COURSEFLOW_JWT_SECRET:dev-only-courseflow-jwt-secret-change-me-2026}

# -- FOR UPLOADING PROFILE PICTURE --
file.upload-dir=${COURSEFLOW_UPLOAD_DIR:./uploads/profile-pictures}
server.port=${PORT:8080}
