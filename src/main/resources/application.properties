spring.application.name=courseflow
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/courseflow}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:courseflow}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:courseflow}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.datasource.driver-class-name=org.postgresql.Driver
# --- JPA / HIBERNATE CONFIG ---
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.cache.type=simple

# -- FOR UPLOADING PROFILE PICTURE --
file.upload-dir=${FILE_UPLOAD_DIR:./uploads/profile-pictures}
server.port=${PORT:8080}
server.forward-headers-strategy=framework

# -- DEPLOYMENT / SECURITY --
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://127.0.0.1:5173,http://127.0.0.1:4173,https://*.vercel.app}
app.jwt.secret=${APP_JWT_SECRET:dev-only-courseflow-jwt-secret-change-me-2026}
